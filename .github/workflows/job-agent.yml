name: Autonomous Job Agent

on:
  workflow_dispatch:
  schedule:
    - cron: "30 4,6,8,10,12,14,16 * * 1-6"

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Show installed Apify versions
        run: |
          python -m pip show apify-client apify-shared
          python -c "from apify_client import ApifyClient; print('Apify import OK')"

      - name: Install Playwright Chromium
        run: python -m playwright install chromium

      - name: Write Google service account file
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          raw = os.environ.get("GOOGLE_SERVICE_ACCOUNT_JSON", "").strip()
          if not raw:
              raise SystemExit("GOOGLE_SERVICE_ACCOUNT_JSON repository secret is empty or missing.")

          try:
              data = json.loads(raw)
          except json.JSONDecodeError as exc:
              raise SystemExit(f"GOOGLE_SERVICE_ACCOUNT_JSON is not valid JSON: {exc}") from exc

          required_keys = {"client_email", "private_key", "token_uri"}
          missing = sorted(required_keys - data.keys())
          if missing:
              raise SystemExit(
                  "GOOGLE_SERVICE_ACCOUNT_JSON is missing required key(s): "
                  + ", ".join(missing)
              )

          Path("service_account.json").write_text(json.dumps(data), encoding="utf-8")
          print("Google service account JSON validated.")
          PY

      - name: Run autonomous job agent
        env:
          RUN_MODE: live
          MAX_JOBS: 20
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          APIFY_ACTOR_ID: ${{ secrets.APIFY_ACTOR_ID }}
          JOBSPY_ENABLED: true
          JOBSPY_SITES: linkedin
          JOBSPY_SEARCH_TERM: backend engineer,python developer,software engineer
          JOBSPY_LOCATION: India,Bangalore,Hyderabad,Noida,Gurgaon,Remote
          JOBSPY_HOURS_OLD: 24
          JOBSPY_FETCH_DESCRIPTION: true
          JOBSPY_RESULTS_PER_SEARCH: 25
          JOBSPY_MAX_FETCHED_JOBS: 200
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: llama-3.1-8b-instant
          GROQ_REQUEST_DELAY_SECONDS: 30
          SNOV_CLIENT_ID: ${{ secrets.SNOV_CLIENT_ID }}
          SNOV_CLIENT_SECRET: ${{ secrets.SNOV_CLIENT_SECRET }}
          SNOV_SEARCH_LIMIT_PER_RUN: 10
          HUNTER_API_KEY: ${{ secrets.HUNTER_API_KEY }}
          PUBLIC_CONTACT_ENABLED: true
          PUBLIC_CONTACT_MAX_PAGES: 5
          GMAIL_SENDER_EMAIL: ${{ secrets.GMAIL_SENDER_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_API_CLIENT_ID: ${{ secrets.GMAIL_API_CLIENT_ID }}
          GMAIL_API_CLIENT_SECRET: ${{ secrets.GMAIL_API_CLIENT_SECRET }}
          GMAIL_API_REFRESH_TOKEN: ${{ secrets.GMAIL_API_REFRESH_TOKEN }}
          GMAIL_API_SENDER_EMAIL: ${{ secrets.GMAIL_API_SENDER_EMAIL }}
          FOLLOWUP_ENABLED: true
          FOLLOWUP_MAX_COUNT: 3
          FOLLOWUP_DUE_DAYS: 1,2,3
          FOLLOWUP_DAILY_LIMIT: 10
          SKIP_EMAIL_ON_SUNDAY: true
          LOCAL_TIMEZONE: Asia/Calcutta
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_FILE: service_account.json
          GOOGLE_WORKSHEET_NAME: applied_jobs
          RESUME_PATH: ./Resume_Sharath_SDE.pdf
          SESSION_COOKIES_PATH: ./session_cookies.json
          MANUAL_REVIEW_DIR: ./manual_review
          PLAYWRIGHT_USER_AGENT: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36
        run: python -m src.main
